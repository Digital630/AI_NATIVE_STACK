name: CI
# Both products are first-class directories in this monorepo (no submodules).
# Each job cd's into its product directory via defaults.run.working-directory.

on:
  push:
    branches: ["main", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  tradedoc:
    name: TradeDoc — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TradeDoc-

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: TradeDoc-/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (includes tsc)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: Test
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: Lint
        run: npm run lint
        continue-on-error: true

  agrismes:
    name: AgriSMES — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agrismes-ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, matching the npm that generated package-lock.json.
          # Node 22 (npm 10) resolves esbuild differently and rejects the lock under `npm ci`.
          node-version: "24"
          cache: "npm"
          cache-dependency-path: agrismes-ai/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder_anon_key

      - name: Test
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key

      - name: Lint
        run: npm run lint
        continue-on-error: true
